        ['✅ 建议','保持试验运行，识别结果回流模型训练']]},
    ],
    feed:['—','—','—','—','—','试验点'],
  },
};
const EARLY_TIP = {
  '连江渔排':{w:'今日',hi:'33',lo:'27',tips:['黎明 DO 3.2 严重偏低，白天先暂停投喂，增氧后视恢复少量投喂','校准 pH/DO 传感器确认数据真实性','大潮期继续关注西侧网衣']},
  '三沙湾养殖点':{w:'今日',hi:'34',lo:'26',tips:['黎明 DO 6.8 偏低但白天会回升，按 14kg 正常投喂','盐度略偏高持续关注','避开 10–15 点正午']},
  '罗源湾一号养殖点':{w:'今日',hi:'34',lo:'26',tips:['黎明 DO 7.2 充足，按计划投喂 12.5kg','各项指标正常，维持管理']},
  '鉴江海区养殖点':{w:'今日',hi:'33',lo:'26',tips:['盐度偏高持续监测','正常投喂 11kg']},
  '霞浦鱼井澳养殖点':{w:'今日',hi:'34',lo:'26',tips:['黎明 DO 5.8 偏低，白天回升后傍晚投喂','夜间保持增氧']},
  '闽江大学实验室':{w:'—',hi:'—',lo:'—',tips:['试验点，不参与生产提示']},
};

/* 场次相关读取：SD(name)=当前场次站点数据；tipsOf(name)=当前场次提示 */
function isEarly(){ const v=document.getElementById('advBatch')?.value||'18:00'; return parseInt(v)<12; }
function SD(name){ return isEarly() ? (EARLY[name]||SITES[name]) : SITES[name]; }
function tipsOf(name){ return isEarly() ? (EARLY_TIP[name]||TIP24[name]) : TIP24[name]; }
/* 场次选项 = “每日养殖建议”智能体的定时触发时刻（来自 localStorage，默认 06:00/18:00） */
function buildBatchSel(){
  let times=['06:00','18:00'];
  try{ times = JSON.parse(localStorage.getItem('advSchedule')) || times; }catch(e){}
  if(!times.length) times=['06:00','18:00'];
  const sel=document.getElementById('advBatch');
  sel.innerHTML = times.map(t=>`<option value="${t}">${parseInt(t)<12?'🌅 早场':'🌇 晚场'} ${t}</option>`).join('');
  sel.value = times.find(t=>parseInt(t)>=12) || times[times.length-1];  // 默认晚场
}

/* ===== 渲染 ===== */
function cardHTML(c){
  const t=TONE[c.tone];
  return `<div class="card" style="box-shadow:none;border:1px solid var(--border);border-left:4px solid ${t.c}">
    <div class="card-h" style="margin-bottom:8px"><h3 style="font-size:14px">${t.i} ${c.title}</h3><span class="tag ${t.x}">${t.l}</span></div>
    ${c.rows.map(r=>`<div class="adv-row"><span class="adv-k">${r[0]}</span><span class="adv-v">${r[1]}</span></div>`).join('')}
  </div>`;
}
function kpiHTML(items){
  return items.map(it=>{
    const col={red:'var(--red)',amber:'var(--amber)',green:'var(--green)',gray:'var(--text3)'}[it[2]]||'var(--text)';
    return `<div class="kpi"><div class="lbl">${it[0]}</div><div class="val" style="font-size:22px;color:${col}">${it[1]}</div></div>`;
  }).join('');
}
function bannerHTML(b,site){
  const t=TONE[b.tone];
  return `<div class="card mt" style="border-left:4px solid ${t.c}">
    <div class="card-h"><h3>${t.i} ${site} · ${b.title}</h3><span class="tag ${t.x}">${t.l}</span></div>
    <div class="grid cols-3" style="gap:10px">${b.a.map(x=>`<div style="background:${t.x==='red'?'#fef2f2':t.x==='amber'?'#fffbeb':'#f0fdf4'};padding:10px;border-radius:8px"><b>${x.split('、')[0]}</b></div>`).join('')}</div>
  </div>`;
}
function feedRow(site){
  const f=SD(site).feed;
  return `<tr><td><b>${site}</b></td><td>${f[0]}</td><td>${f[1]}</td><td>${f[2]}</td><td>${f[3]}</td><td>${f[4]}</td><td>${f[5]}</td></tr>`;
}

function render(){
  const scope = window.SITE_CTX || '全部站点';
  const early = isEarly();
  $('scopeText').innerHTML = (early?'🌅 早场 06:00':'🌇 晚场 18:00')+' · '+(scope==='全部站点'
    ? '当前分析范围：<b>全部 6 个站点</b>'
    : `当前分析范围：<b>${scope}</b>（${SD(scope).region}）· <span class="tag ${TONE[SD(scope).status].x}">${SD(scope).tag}</span>`)
    + ' · '+(early?'基于夜间至黎明数据，侧重夜间溶氧/今日投喂':'基于白天数据+明日预报，侧重夜间值守/明日投喂');
  $('advFoot').textContent = `📄 历史归档：${archiveLabel()} · 由「每日养殖建议」智能体生成 · GLM-4.6 + 大黄鱼知识库 · 范围：${scope}`;
  if(scope==='全部站点'){ renderAll(); }
  else { renderSite(scope); }
}

function archiveLabel(){
  const d = document.getElementById('advDate')?.value || '2026-07-15';
  const b = document.getElementById('advBatch')?.value || '18:00';
  return `${d} ${b}（${parseInt(b)<12?'早场':'晚场'}）`;
}

function renderAll(){
  // KPI 汇总（按当前场次统计）
  const red = ORDER.filter(s=>SD(s).status==='red').length;
  const amber = ORDER.filter(s=>SD(s).status==='amber').length;
  const ok = ORDER.filter(s=>['green','gray'].includes(SD(s).status)).length;
  $('kpis').innerHTML = kpiHTML([
    ['分析站点','6','green'],['需处置',String(red),'red'],['需关注',String(amber),'amber'],['正常/试验',String(ok),'green']]);
  let html = '';
  // 重点站点 banner（按场次）
  ORDER.forEach(s=>{ if(SD(s).banner) html += bannerHTML(SD(s).banner,s); });
  // 全部融合预测卡
  html += `<div class="card mt"><div class="card-h"><h3>🔮 多源数据融合预测建议</h3><span class="tag blue">按站点分组 · 数据 → 经验 → 分析 → 预测 → 建议</span></div>
    ${ORDER.map(s=>{
      const st=TONE[SD(s).status];
      return `<div style="margin-top:16px">
        <div style="display:flex;align-items:center;gap:8px;margin-bottom:10px">
          <span class="tag ${st.x}">${st.i} 📍 ${s}</span>
          <span class="small muted">${SD(s).region} · ${SD(s).tag}</span>
        </div>
        <div class="grid cols-2" style="gap:14px">${SD(s).cards.map(c=>cardHTML(c)).join('')}</div>
      </div>`;
    }).join('')}
    <div class="small muted mt">二期接入生长/低氧/病害小模型后，预测量化精度将进一步提升。</div></div>`;
  // 正常投喂表
  html += `<div class="card mt"><div class="card-h"><h3>✅ 各站点投喂建议</h3><span class="more" onclick="exportData('投喂建议')" style="cursor:pointer">导出</span></div>
    <div class="tbl-wrap"><table><tr><th>站点</th><th>水温</th><th>DO</th><th>建议投喂量</th><th>投喂率</th><th>投喂时刻</th><th>备注</th></tr>
    ${ORDER.map(feedRow).join('')}</table></div></div>`;
  // 全局通用提示（不针对单站温度，只给通用海洋气象判断）
  html += `<div class="card mt" style="background:linear-gradient(135deg,#0ea5e9,#14b8a6);color:#fff">
    <div class="card-h"><h3 style="color:#fff">🌊 未来 24h 全局提示（通用）</h3></div>
    <ul style="margin-left:18px;line-height:1.9;font-size:13.5px">
      <li>农历初一<b>大潮期</b>，各站点加强网衣巡检与溶氧监控（潮汐带来水流与溶氧变化）。</li>
      <li>夜间至凌晨为<b>溶氧低谷</b>，各站视情增氧、避开低氧时段投喂。</li>
      <li>无台风/强降水预报，海洋气象整体平稳。<b>各站水温不同，具体见下方专属提示</b>。</li>
    </ul></div>`;
  // 各站点专属提示（早场=今日指导，晚场=未来24h）
  const tipTitle = isEarly() ? '📍 各站点今日投喂与巡检指导' : '📍 各站点未来 24h 专属提示';
  html += `<div class="card mt"><div class="card-h"><h3>${tipTitle}</h3><span class="tag blue">${isEarly()?'基于黎明数据，指导今日':'按各站水温/水质分别给出'}</span></div>
    <div class="grid cols-2" style="gap:14px">${ORDER.map(siteTipHTML).join('')}</div></div>`;
  $('advBody').innerHTML = html;
}

function siteTipHTML(name){
  const t=tipsOf(name), st=SD(name).status, ic=TONE[st].i;
  return `<div class="card" style="box-shadow:none;border:1px solid var(--border)">
    <div class="card-h" style="margin-bottom:6px"><h3 style="font-size:14px">${ic} ${name}</h3>
      <span class="muted small">${t.w} ${t.hi}/${t.lo}℃</span></div>
    <ul style="margin:0 0 0 18px;font-size:12.5px;line-height:1.75;color:var(--text2)">${t.tips.map(x=>`<li>${x}</li>`).join('')}</ul>
  </div>`;
}

function renderSite(name){
  const s = SD(name);
  $('kpis').innerHTML = kpiHTML(s.kpi);
  let html = '';
  if(s.banner) html += bannerHTML(s.banner,name);
  html += `<div class="card mt"><div class="card-h"><h3>🔮 ${name} · 多源数据融合预测</h3><span class="tag blue">数据 · 经验 · 分析 · 预测 · 建议</span></div>
    <div class="grid cols-2" style="gap:14px">${s.cards.map(cardHTML).join('')}</div></div>`;
  html += `<div class="card mt"><div class="card-h"><h3>🍽️ ${name} 投喂建议</h3></div>
    <div class="tbl-wrap"><table><tr><th>站点</th><th>水温</th><th>DO</th><th>建议投喂量</th><th>投喂率</th><th>投喂时刻</th><th>备注</th></tr>
    ${feedRow(name)}</table></div></div>`;
  // 该站点专属提示（早场=今日指导，晚场=未来24h）
  const t=tipsOf(name);
  const tipTitle = isEarly() ? `📍 ${name} 今日投喂与巡检指导` : `📍 ${name} 未来 24h 专属提示`;
  html += `<div class="card mt"><div class="card-h"><h3>${tipTitle}</h3><span class="muted small">${t.w} ${t.hi}/${t.lo}℃</span></div>
    <ul style="margin-left:18px;font-size:13px;line-height:1.8;color:var(--text2)">${t.tips.map(x=>`<li>${x}</li>`).join('')}</ul></div>`;
  if(s.status==='green'||s.status==='gray')
    html += `<div class="card mt center" style="color:var(--text2)"><div style="font-size:30px">${TONE[s.status].i}</div><div class="mt">该站点当前${s.tag}，暂无紧急风险。维持日常管理即可。</div></div>`;
  $('advBody').innerHTML = html;
}

function reanalyze(){
  const body=`<div style="padding:14px 4px">
    <div style="display:flex;align-items:center;gap:10px;color:#0284c7"><span style="font-size:22px">⚙️</span><b>正在重新汇总数据并调用智能体分析…</b></div>
    <div style="height:6px;background:#f1f5f9;border-radius:4px;margin:12px 0;overflow:hidden"><div style="height:100%;width:100%;background:linear-gradient(90deg,#0ea5e9,#14b8a6)"></div></div>
    <div class="ok small">✅ 分析完成 · 已生成 <b>${archiveLabel()}</b> 归档（范围：${window.SITE_CTX||'全部站点'}）</div></div>`;
  openModal('▶ 立即重新分析', body, {width:440, foot:false});
}

window.addEventListener('sitechange', render);
// 切换日期/场次 = 浏览历史归档；切换场次会重渲染内容（早场/晚场不同），日期共用内容只更新归档标识
function bindArchive(){
  document.getElementById('advDate').addEventListener('change', ()=>{ render(); });
  document.getElementById('advBatch').addEventListener('change', ()=>{ render(); });
}
bindArchive();
buildBatchSel();
render();
</script>
</body>
</html>
