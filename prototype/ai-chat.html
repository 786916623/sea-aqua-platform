<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>AI 智能问答 - 智慧海洋养殖管控平台</title>
<link rel="stylesheet" href="assets/style.css">
</head>
<body>
<div class="layout">
  <aside class="sidebar" id="sidebar"></aside>
  <div class="main">
    <header class="topbar" id="topbar"></header>
    <div class="content" style="display:flex;flex-direction:column">

      <div class="page-head">
        <div>
          <h1>🤖 AI 智能问答</h1>
          <p>对话式咨询 · 左侧可管理多个会话 · 咨询范围由顶栏「全局范围」下拉框统一控制</p>
        </div>
        <div><span class="tag blue" data-scope-chip>🔍 已筛选：全部站点</span></div>
      </div>

      <div class="chat-layout">
        <!-- 左侧：会话列表（纵向） -->
        <aside class="conv-panel">
          <div class="conv-head">
            <b>💬 会话列表</b>
            <button class="btn" onclick="addConv()" style="padding:5px 10px;font-size:12px">＋ 新会话</button>
          </div>
          <div class="conv-list" id="chatTabs"></div>
        </aside>

        <!-- 右侧：聊天窗口 -->
        <div class="chat-main">
          <div class="chat-log" id="chatLog"></div>
          <div class="chat-input">
            <textarea id="chatInput" placeholder="针对当前全局范围提问，回车发送…"></textarea>
            <button class="btn primary" id="chatSend" style="height:46px">发送 ➤</button>
          </div>
        </div>
      </div>
      <div class="small muted center" style="padding:8px 0 0">范围跟随顶栏全局下拉框 · GLM-4.6 + 大黄鱼知识库 · 仅供决策参考</div>

    </div>
  </div>
</div>
<script src="assets/nav.js"></script>
<script>
document.getElementById('topbar').innerHTML = topbar(['AI 智能','AI 智能问答']);

const $ = id => document.getElementById(id);
let seq = 0;
const conversations = {};   // {id:{title,msgs:[{who,text,ty?}]}}
let activeId = null;

const strip = s => (s||'').replace(/<[^>]*>/g,'');

function newConversation(seed){
  const id = ++seq;
  const scope = window.SITE_CTX || '全部站点';
  conversations[id] = {title:'新会话 '+id, msgs:[
    {who:'ai', text:`👋 你好，我是养殖助手。当前<b>全局范围：${scope}</b>。可问投喂、水质、风险、产量等。`}
  ]};
  if(seed) conversations[id].msgs.push(...seed);
  activeId = id;
  return id;
}

function renderTabs(){
  const ids = Object.keys(conversations);
  $('chatTabs').innerHTML = ids.map(id=>{
    const c = conversations[id];
    const last = c.msgs.filter(m=>!m.ty).slice(-1)[0];
    const preview = last ? (last.who==='user'?'我：':'') + strip(last.text).slice(0,22) : '开始新对话…';
    return `<div class="conv-item ${id==activeId?'active':''}" onclick="switchTo(${id})">
      <div class="ci-row"><span class="ci-t">💬 ${c.title}</span>
      ${ids.length>1?`<span class="x" onclick="event.stopPropagation();closeConv(${id})">×</span>`:''}</div>
      <div class="ci-s">${preview}</div>
    </div>`;
  }).join('');
}

function renderLog(){
  const c = conversations[activeId];
  $('chatLog').innerHTML = c.msgs.map(m=>`<div class="msg ${m.who}"><div class="bubble">${m.text}</div></div>`).join('');
  $('chatLog').scrollTop = $('chatLog').scrollHeight;
}

function switchTo(id){ activeId = id; renderTabs(); renderLog(); }
function addConv(){ newConversation(); renderTabs(); renderLog(); $('chatInput').focus();
  $('chatLog').scrollTop = $('chatLog').scrollHeight; }
function closeConv(id){ delete conversations[id]; if(activeId==id) activeId = Object.keys(conversations)[0]; renderTabs(); renderLog(); }

function addMsg(who,text){ conversations[activeId].msgs.push({who,text}); renderLog(); renderTabs(); }
function typing(){
  conversations[activeId].msgs.push({who:'ai',text:`<span class="copilot-typing"><span></span><span></span><span></span></span>`,ty:true});
  renderLog();
}
function clearTyping(){
  const c = conversations[activeId];
  if(c.msgs.length && c.msgs[c.msgs.length-1].ty) c.msgs.pop();
}

function reply(q){
  const scope = (window.SITE_CTX && window.SITE_CTX!=='全部站点') ? '「'+window.SITE_CTX+'」' : '全部 6 个站点';
  const has=(...ks)=>ks.some(k=>q.includes(k));
  if(has('投','喂','料')) return `<b>📊 ${scope} 投喂建议</b><br>按水温 25.6℃（最适区）、DO 充足、投喂率 1.5%BW：<br><b>建议 14.0kg / 日，分 2 次（07:00、17:00）</b>。<br>提示：避开夜间低氧期；摄食响应弱则下次下调 10–20%。`;
  if(has('溶解氧','溶氧','DO','缺氧')) return `⚠️ 当前 DO 偏低。建议：① 暂停投喂；② 夜间开启增氧；③ 凌晨加密巡检防泛塘。<br>注：连江渔排 DO 3.9 与邻站(7–8)系统性背离，疑似<b>传感器故障</b>，需先校准。`;
  if(has('上市','起捕','规格','卖')) return `🐟 以声纳体长均值 22.6cm、均重 ~503g 看，距常见上市规格(400–500g)已接近，预计 <b>2–3 周</b>内可达规格。`;
  if(has('风险','告警','危险','台风')) return `🚨 当前 1 条严重(三沙湾水温过高)、7 条关注。<b>未来 24h</b>：明日高温 34℃叠加、农历大潮期，需加强夜间溶氧与网衣巡检。`;
  if(has('pH','酸碱')) return `🧪 pH 适宜区 7.8–8.5。当前多数站点 ~8.1 正常；<b>连江 6.27 已入危险区</b>，疑似传感器异常，建议校准。`;
  if(has('盐度','咸')) return `🧂 盐度适宜区 25–32ppt。三沙湾 31.38、鉴江 32.10 略偏高，关注上升，必要时换水。`;
  if(has('你好','hi','嗨','在吗')) return `👋 在的！当前全局范围 <b>${scope}</b>。能算投喂量、判断水质风险、预估上市时间，直接问～`;
  return `已收到「${q}」。<br>📊 当前全局范围 <b>${scope}</b>。我是原型，暂用示例回答；正式版将接入实时数据与大模型。`;
}

function send(){
  const q = $('chatInput').value.trim(); if(!q) return;
  addMsg('user', q); $('chatInput').value=''; typing();
  setTimeout(()=>{ clearTyping(); addMsg('ai', reply(q)); }, 650);
}
$('chatSend').addEventListener('click', send);
$('chatInput').addEventListener('keydown', e=>{ if(e.key==='Enter' && !e.shiftKey){ e.preventDefault(); send(); } });

function syncCtx(){
  const v = window.SITE_CTX || '全部站点';
  $('chatInput').placeholder = v==='全部站点' ? '针对全部站点提问，回车发送…' : `针对「${v}」提问，回车发送…`;
}
window.addEventListener('sitechange', syncCtx);
syncCtx();

/* 初始化：会话1（示例）+ 会话2（空白） */
newConversation([
  {who:'user', text:'今天该投多少料？'},
  {who:'ai', text:`<b>📊 投喂建议</b>（全局范围：全部站点）<br>水温 25.6℃（最适区）、DO 充足、投喂率 1.5%BW：<br><b>合计 58.5kg / 日</b>，各站点分 2 次（07:00 / 17:00）。<br>提示：连江渔排因 DO 偏低建议暂停，待数据核实。`}
]);
newConversation();
renderTabs();
renderLog();
</script>
</body>
</html>
